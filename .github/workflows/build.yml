name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests websockets certifi pystray Pillow zeroconf pyinstaller

      - name: Inject version
        run: python inject_version.py ${{ github.ref_name }}

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --name VerbBridge²
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --hidden-import tkinter.scrolledtext
          --hidden-import tkinter.messagebox
          --collect-submodules tkinter
          --collect-data certifi
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/VerbBridge².exe

  build-macos:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests websockets certifi pystray Pillow zeroconf pyinstaller

      - name: Inject version
        run: python3 -c "import re; t=open('main.py').read(); open('main.py','w').write(re.sub(r'VERSION = \"dev\"', 'VERSION = \"${{ github.ref_name }}\"', t))"

      - name: Build app
        run: >
          pyinstaller
          --onefile
          --windowed
          --name VerbBridge²
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --hidden-import tkinter.scrolledtext
          --hidden-import tkinter.messagebox
          --collect-submodules tkinter
          --collect-data certifi
          main.py

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r VerbBridge²-mac.zip VerbBridge².app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/VerbBridge²-mac.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/VerbBridge².exe
            artifacts/VerbBridge²-mac.zip
          generate_release_notes: true
